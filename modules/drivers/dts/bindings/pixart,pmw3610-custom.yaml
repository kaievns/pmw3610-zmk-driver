description: |
  PixArt PMW3610 ultra-low-power optical motion sensor (trackball).
  SPI device with 3-wire SDIO (connect MOSI and MISO to the same SDIO line).

compatible: "pixart,pmw3610-custom"

include: spi-device.yaml

properties:
  motion-gpios:
    type: phandle-array
    required: true
    description: Motion interrupt GPIO (active-low).

  cpi:
    type: int
    default: 800
    description: |
      Initial CPI (counts per inch), range 200-3200.
      Must be a multiple of 200.

  invert-x:
    type: boolean
    description: Invert X axis in hardware via the RES_STEP register.

  invert-y:
    type: boolean
    description: Invert Y axis in hardware via the RES_STEP register.

  smart-mode:
    type: boolean
    description: |
      Enable the smart tracking algorithm for improved tracking on
      difficult surfaces. Off by default.
